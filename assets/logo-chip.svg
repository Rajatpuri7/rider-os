<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Variation: folder as a processor chip — "the intelligence lives in the directory".
       Inspiration: literal-function marks (Docker's whale-with-containers). -->
  <rect width="512" height="512" rx="100" fill="#0F172A"/>
  <!-- chip pins -->
  <g fill="#F59E0B">
    <rect x="52" y="204" width="36" height="16" rx="6"/>
    <rect x="52" y="252" width="36" height="16" rx="6"/>
    <rect x="52" y="300" width="36" height="16" rx="6"/>
    <rect x="52" y="348" width="36" height="16" rx="6"/>
    <rect x="424" y="204" width="36" height="16" rx="6"/>
    <rect x="424" y="252" width="36" height="16" rx="6"/>
    <rect x="424" y="300" width="36" height="16" rx="6"/>
    <rect x="424" y="348" width="36" height="16" rx="6"/>
  </g>
  <!-- folder body -->
  <path d="M114,156 h86 l34,34 h164 c14.4,0 26,11.6 26,26 v160 c0,14.4 -11.6,26 -26,26 H114 c-14.4,0 -26,-11.6 -26,-26 V182 c0,-14.4 11.6,-26 26,-26 Z"
        fill="#F59E0B"/>
  <!-- circuit network inside -->
  <g stroke="#0F172A" stroke-width="9" fill="none">
    <line x1="256" y1="292" x2="202" y2="242"/>
    <line x1="256" y1="292" x2="310" y2="242"/>
    <line x1="256" y1="292" x2="202" y2="342"/>
    <line x1="256" y1="292" x2="310" y2="342"/>
  </g>
  <g fill="#0F172A">
    <circle cx="256" cy="292" r="16"/>
    <circle cx="202" cy="242" r="10"/>
    <circle cx="310" cy="242" r="10"/>
    <circle cx="202" cy="342" r="10"/>
    <circle cx="310" cy="342" r="10"/>
  </g>
</svg>
