<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- RIDER: the intelligent folder that rides any AI model.
       Mark: a folder (the system) branded with a horseshoe (the horse it commands). -->
  <rect width="512" height="512" rx="100" fill="#0F172A"/>
  <!-- folder -->
  <path d="M114,156 h86 l34,34 h164 c14.4,0 26,11.6 26,26 v160 c0,14.4 -11.6,26 -26,26 H114 c-14.4,0 -26,-11.6 -26,-26 V182 c0,-14.4 11.6,-26 26,-26 Z"
        fill="#F59E0B"/>
  <!-- horseshoe, opening downward -->
  <path d="M196,336 A72,72 0 1 1 316,336" fill="none" stroke="#0F172A"
        stroke-width="30" stroke-linecap="butt"/>
  <!-- nail holes -->
  <g fill="#F59E0B">
    <circle cx="326.9" cy="308.5" r="6.5"/>
    <circle cx="323.7" cy="271.4" r="6.5"/>
    <circle cx="297.3" cy="237.0" r="6.5"/>
    <circle cx="256"   cy="224.0" r="6.5"/>
    <circle cx="214.7" cy="237.0" r="6.5"/>
    <circle cx="188.3" cy="271.4" r="6.5"/>
    <circle cx="185.1" cy="308.5" r="6.5"/>
  </g>
</svg>
