<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- RIDER logo: classic staunton chess knight inside the folder. -->
  <rect width="512" height="512" rx="100" fill="#0F172A"/>
  <!-- folder -->
  <path d="M114,156 h86 l34,34 h164 c14.4,0 26,11.6 26,26 v160 c0,14.4 -11.6,26 -26,26 H114 c-14.4,0 -26,-11.6 -26,-26 V182 c0,-14.4 11.6,-26 26,-26 Z"
        fill="#F59E0B"/>
  <g transform="translate(0,4)">
    <!-- knight head and neck -->
    <path d="M256,198 L272,216
             C296,238 310,274 310,316 L310,344 L226,344
             C228,320 234,302 244,290
             C236,288 230,282 232,274
             C224,272 208,272 196,270
             C182,268 172,262 171,252
             C170,246 174,242 180,240
             C196,234 212,230 224,226
             C238,221 248,212 256,198 Z" fill="#0F172A"/>
    <!-- eye -->
    <circle cx="244" cy="246" r="6.5" fill="#F59E0B"/>
    <!-- inner mane line along the neck -->
    <path d="M276,228 C294,248 302,280 302,314" fill="none"
          stroke="#F59E0B" stroke-width="6" stroke-linecap="round"/>
    <!-- collar, pedestal, plinth -->
    <rect x="210" y="344" width="112" height="14" rx="6" fill="#0F172A"/>
    <rect x="202" y="358" width="128" height="14" rx="7" fill="#0F172A"/>
    <rect x="192" y="372" width="148" height="16" rx="5" fill="#0F172A"/>
  </g>
</svg>
