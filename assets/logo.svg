<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- RIDER logo: a chess knight (the horse) living inside the folder (the system). -->
  <rect width="512" height="512" rx="100" fill="#0F172A"/>
  <!-- folder -->
  <path d="M114,156 h86 l34,34 h164 c14.4,0 26,11.6 26,26 v160 c0,14.4 -11.6,26 -26,26 H114 c-14.4,0 -26,-11.6 -26,-26 V182 c0,-14.4 11.6,-26 26,-26 Z"
        fill="#F59E0B"/>
  <!-- knight, dark on amber, fully inside the folder body -->
  <path d="M262,214 L282,234 Q306,254 310,298 L310,348 L234,348
           Q236,318 254,304 L240,294 Q206,286 192,266
           Q186,256 196,252 L216,246 Q236,240 248,226 Z"
        fill="#0F172A"/>
  <!-- eye -->
  <circle cx="271" cy="253" r="7" fill="#F59E0B"/>
  <!-- mane accents -->
  <g stroke="#F59E0B" stroke-width="7" stroke-linecap="round">
    <line x1="288" y1="262" x2="303" y2="270"/>
    <line x1="291" y1="286" x2="306" y2="293"/>
  </g>
  <!-- plinth -->
  <rect x="212" y="348" width="112" height="20" rx="8" fill="#0F172A"/>
</svg>
